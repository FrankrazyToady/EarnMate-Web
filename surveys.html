<!DOCTYPE html>
<html>
<head>
  <title>Surveys - EarnMate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <h1>📝 Surveys</h1>
  <div class="balance-pill">💰 <span id="coins">0</span></div>
</div>

<!-- SURVEY WALL -->
<iframe id="surveyFrame" width="100%" height="1000px" frameborder="0"></iframe>

<!-- OPTIONAL STATUS -->
<p id="status" style="text-align:center;"></p>

<!-- NAV -->
<div class="bottom-nav">
  <a href="index.html">🏠<br>Home</a>
  <a href="surveys.html" class="active">📊<br>Surveys</a>
  <a href="game.html">🎮<br>Games</a>
  <a href="rewards.html">🎁<br>Rewards</a>
  <a href="wallet.html">💸<br>Wallet</a>
  <a href="community.html">💬<br>Community</a>
  <a href="profile.html">👤<br>Profile</a>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    databaseURL: "YOUR_DB_URL",
    projectId: "YOUR_ID",
  };

  firebase.initializeApp(firebaseConfig);
</script>

<!-- MAIN SCRIPT -->
<script>
let coins = 0;

// ✅ CREATE / GET USER ID
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = "user_" + Math.floor(Math.random() * 1000000);
  localStorage.setItem("userId", userId);
}

// ✅ LOAD COINS FROM FIREBASE
firebase.database().ref("users/" + userId).on("value", (snapshot) => {
  if (snapshot.exists()) {
    coins = snapshot.val().coins || 0;
    updateUI();
  }
});

// ✅ UPDATE UI
function updateUI() {
  document.getElementById("coins").innerText = coins;
}

// ✅ LOAD CPX SURVEYS
document.addEventListener("DOMContentLoaded", function () {
  let frame = document.getElementById("surveyFrame");

  frame.src = "https://offers.cpx-research.com/index.php?app_id=32235&ext_user_id=" + userId;
});
</script>

</body>
</html>
